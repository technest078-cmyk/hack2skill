name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: ESLint Check
      working-directory: ./frontend
      run: npm run lint || echo "ESLint completed with warnings"
      continue-on-error: true
    
    - name: Prettier Check
      working-directory: ./frontend
      run: npm run format:check || echo "Prettier check completed"
      continue-on-error: true
    
    - name: Type Check
      working-directory: ./frontend
      run: npx tsc --noEmit || echo "Type checking completed"
    
    - name: Bundle Size Check
      working-directory: ./frontend
      run: |
        npm run build
        du -sh dist/
        echo "Bundle size check completed"

  backend-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint mypy black flake8
    
    - name: Black Format Check
      working-directory: ./backend
      run: black --check .
      continue-on-error: true
    
    - name: Flake8 Check
      working-directory: ./backend
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      continue-on-error: true
    
    - name: Pylint Check
      working-directory: ./backend
      run: pylint *.py --fail-under=8.0
      continue-on-error: true
    
    - name: MyPy Type Check
      working-directory: ./backend
      run: mypy --config-file mypy.ini *.py || echo "Type checking completed"
      continue-on-error: true

  sonarcloud:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true
