sonar.projectKey=greenpulse-ai
sonar.organization=greenpulse

# Project information
sonar.projectName=GreenPulse AI
sonar.projectVersion=1.0.0

# Source code paths
sonar.sources=frontend/src,backend
sonar.tests=frontend/src,backend
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/test_*.py

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/__pycache__/**,**/coverage/**

# Coverage
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.python.coverage.reportPaths=backend/coverage.xml

# Language settings
sonar.sourceEncoding=UTF-8
